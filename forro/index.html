<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ana &amp; Nader · Studio Farhat Arquitetura</title>
<style>
  :root{--bg:#14110e;--line:#362d23;--text:#f3ece2;--muted:#b8a892;--accent:#e0a45c}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);
    font-family:'Segoe UI',-apple-system,Helvetica,Arial,sans-serif}
  header{padding:64px 24px 40px;text-align:center}
  header .kicker{letter-spacing:.42em;text-transform:uppercase;color:var(--accent);
    font-size:12px;margin-bottom:16px}
  header h1{font-size:clamp(30px,5.5vw,56px);font-weight:300;letter-spacing:.04em}
  header h1 b{font-weight:700}
  main{max-width:1280px;margin:0 auto;padding:20px 16px 40px;
    display:grid;gap:18px}
  @media(min-width:820px){main{grid-template-columns:1fr 1fr}}
  figure{margin:0;border-radius:14px;overflow:hidden;background:#000;
    box-shadow:0 16px 44px rgba(0,0,0,.45)}
  figure img{width:100%;height:100%;display:block}
  footer{text-align:center;color:var(--muted);font-size:12px;
    padding:30px 20px 60px;letter-spacing:.06em}
</style>
</head>
<body>
<header>
  <div class="kicker">Studio Farhat Arquitetura</div>
  <h1>Apartamento <b>Ana &amp; Nader</b></h1>
</header>
<main>
  <figure><img src="sala-tv-sanca.jpg" alt=""></figure>
  <figure><img src="cozinha-jantar.jpg" alt=""></figure>
  <figure><img src="home-office-02.jpg" alt=""></figure>
  <figure><img src="quarto-suite.jpg" alt=""></figure>
  <figure><img src="quarto-hospedes.jpg" alt=""></figure>
  <figure><img src="banheiro-social.jpg" alt=""></figure>
  <figure><img src="banheiro-suite.jpg" alt=""></figure>
</main>
<footer>Studio Farhat Arquitetura</footer>
</body>
</html>
